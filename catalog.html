<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Каталог — ZHUCHY club</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/product-card.css" />
    <link rel="stylesheet" href="css/pages.css" />
  </head>
  <body class="page-enter">
    <a class="skip-link" href="#main">К основному содержимому</a>

    <header class="site-header" role="banner">
      <div class="header-inner">
        <a class="logo" href="index.html" aria-label="ZHUCHY club — на главную">ZHUCHY club</a>
        <nav class="nav-desktop" aria-label="Категории">
          <a href="catalog.html#mens" data-nav-cat="mens">Мужское</a>
          <a href="catalog.html#womens" data-nav-cat="womens">Женское</a>
          <a href="catalog.html#accessories" data-nav-cat="accessories">Аксессуары</a>
          <a href="catalog.html#sale" class="is-sale" data-nav-cat="sale">Sale</a>
        </nav>
        <div class="header-actions">
          <div class="cur-lever-wrap" style="margin-bottom:0">
            <span class="cur-lever-label">₽</span>
            <button type="button" class="cur-lever" data-currency-toggle aria-label="Переключить валюту" aria-pressed="false"><span class="cur-lever__thumb"></span></button>
            <span class="cur-lever-label">$</span>
          </div>
          <a href="cart.html" class="icon-btn cart-btn" aria-label="Корзина">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M6 6h15l-1.5 9h-12z" stroke-linejoin="round" />
              <path d="M6 6 5 3H2" stroke-linecap="round" />
              <circle cx="9" cy="20" r="1" fill="currentColor" />
              <circle cx="18" cy="20" r="1" fill="currentColor" />
            </svg>
            <span class="cart-badge" data-cart-count hidden>0</span>
          </a>
          <button type="button" class="menu-toggle icon-btn" aria-expanded="false" aria-controls="mobile-drawer" aria-label="Открыть меню">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M4 7h16M4 12h16M4 17h16" stroke-linecap="round" />
            </svg>
          </button>
        </div>
      </div>
    </header>

    <div class="mobile-backdrop" aria-hidden="true"></div>
    <aside id="mobile-drawer" class="mobile-drawer" aria-label="Мобильное меню">
      <div class="drawer-header">
        <span class="logo">ZHUCHY club</span>
        <button type="button" class="icon-btn drawer-close" aria-label="Закрыть меню">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22" aria-hidden="true">
            <path d="M6 6l12 12M18 6L6 18" stroke-linecap="round" />
          </svg>
        </button>
      </div>
      <nav class="drawer-nav">
        <a href="catalog.html#mens" data-nav-cat="mens">Мужское</a>
        <a href="catalog.html#womens" data-nav-cat="womens">Женское</a>
        <a href="catalog.html#accessories" data-nav-cat="accessories">Аксессуары</a>
        <a href="catalog.html#sale" class="is-sale" data-nav-cat="sale">Sale</a>
      </nav>
    </aside>

    <div id="site-ticker" class="site-ticker" hidden>
      <div class="site-ticker__track">
        <span class="site-ticker__text" id="site-ticker-text"></span>
        <span class="site-ticker__text" aria-hidden="true" id="site-ticker-text2"></span>
      </div>
    </div>

    <main id="main">
      <section class="section section--tight-top">
        <div class="section__inner">
          <!-- DYNAMIC: хлебные крошки из маршрута -->
          <nav class="breadcrumbs" aria-label="Навигация">
            <ol>
              <li><a href="index.html">Главная</a></li>
              <li><a href="catalog.html" aria-current="page">Каталог</a></li>
            </ol>
          </nav>

          <h1 class="section__title" style="margin-bottom: var(--space-xl)">Каталог</h1>

          <div class="catalog-toolbar">
            <div class="catalog-toolbar__left">
              <p class="catalog-count">
                Показано <span data-catalog-shown>0</span> из
                <span data-catalog-total>0</span>
              </p>
            </div>
            <div class="sort-row">
              <label for="sort">Сортировка</label>
              <select id="sort" class="sort-select" name="sort" data-sort>
                <!-- DYNAMIC: опции с бэкенда -->
                <option value="new">По новизне</option>
                <option value="price-asc">Цена: по возрастанию</option>
                <option value="price-desc">Цена: по убыванию</option>
                <option value="name">По названию</option>
              </select>
            </div>
          </div>

          <div>
              <div class="product-grid" data-catalog-grid></div>

              <div class="catalog-footer">
                <nav class="pagination" aria-label="Страницы"></nav>
              </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>© ZHUCHY club</p>
    </footer>

    <script src="js/cart-storage.js"></script>
    <script src="js/cart-badge.js"></script>
    <script src="js/content.js"></script>
    <script src="js/ui-settings.js"></script>
    <script src="js/site.js"></script>
    <script src="js/currency.js"></script>
    <script src="js/catalog.js"></script>
  </body>
</html>
