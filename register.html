<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Регистрация — ZHUCHY club</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/base.css" />
    <style>
      .auth-wrap { min-height: 100vh; display: grid; place-items: center; padding: var(--space-xl) var(--space-md); }
      .auth-card { width: min(100%, 460px); background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: var(--space-xl); box-shadow: var(--shadow-card); }
      .auth-logo { font-size: 1.1rem; letter-spacing: 0.12em; font-weight: 700; margin-bottom: var(--space-lg); display: block; }
      .auth-title { margin: 0 0 var(--space-sm); font-size: 1.5rem; }
      .auth-sub { color: var(--color-text-muted); font-size: 0.875rem; margin: 0 0 var(--space-xl); }
      .step { display: flex; flex-direction: column; gap: var(--space-md); }
      .step[hidden] { display: none; }
      .field { display: flex; flex-direction: column; gap: 6px; }
      .field-label { font-size: 0.8125rem; color: var(--color-text-muted); font-weight: 500; }
      .code-hint { font-size: 0.8rem; color: var(--color-text-muted); }
      .err-msg { color: var(--color-sale); font-size: 0.875rem; display: none; }
      .err-msg.visible { display: block; }
      .countdown { font-size: 0.8rem; color: var(--color-text-muted); }
    </style>
    <script src="js/theme.js"></script>
  </head>
  <body class="page-enter">
    <main class="auth-wrap">
      <div class="auth-card">
        <a class="auth-logo" href="index.html">ZHUCHY club</a>
        <h1 class="auth-title">Создать аккаунт</h1>
        <p class="auth-sub">Введите email — мы отправим код подтверждения</p>

        <div id="err-global" class="err-msg"></div>

        <!-- Step 1: email -->
        <div class="step" id="step-email">
          <div class="field">
            <label class="field-label" for="reg-email">Email</label>
            <input class="input" id="reg-email" type="email" autocomplete="email" placeholder="you@example.com" />
          </div>
          <button class="btn btn--secondary btn--block" id="btn-send-code" type="button">Получить код</button>
          <p style="font-size:0.8rem;color:var(--color-text-muted);text-align:center">
            Уже есть аккаунт? <a href="login.html" style="text-decoration:underline">Войти</a>
          </p>
        </div>

        <!-- Step 2: code + details -->
        <div class="step" id="step-code" hidden>
          <p class="code-hint">Код отправлен на <strong id="code-email-display"></strong>. Проверьте папку «Спам».</p>
          <div class="field">
            <label class="field-label" for="reg-code">Код из письма</label>
            <input class="input" id="reg-code" type="text" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="6 цифр" autocomplete="one-time-code" />
          </div>
          <div class="field">
            <label class="field-label" for="reg-name">Ваше имя</label>
            <input class="input" id="reg-name" type="text" autocomplete="name" placeholder="Имя" />
          </div>
          <div class="field">
            <label class="field-label" for="reg-password">Пароль <span style="font-weight:400;opacity:.6">(необязательно)</span></label>
            <input class="input" id="reg-password" type="password" autocomplete="new-password" placeholder="Минимум 8 символов" />
          </div>
          <button class="btn btn--secondary btn--block" id="btn-register" type="button">Зарегистрироваться</button>
          <p class="countdown" id="resend-row">
            <span id="resend-timer">Повторно отправить через <strong id="resend-count">60</strong> сек.</span>
            <a href="#" id="btn-resend" style="text-decoration:underline;display:none">Отправить код ещё раз</a>
          </p>
        </div>
      </div>
    </main>
    <script>
      (function () {
        var email = "";
        var timer;

        function showErr(msg) {
          var el = document.getElementById("err-global");
          el.textContent = msg;
          el.classList.toggle("visible", !!msg);
        }

        document.getElementById("btn-send-code").addEventListener("click", async function () {
          showErr("");
          email = document.getElementById("reg-email").value.trim();
          if (!email) return showErr("Введите email");
          this.disabled = true; this.textContent = "Отправка…";
          try {
            const r = await fetch("/api/auth/send-code", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ email, purpose: "register" }) });
            const d = await r.json();
            if (!r.ok) { showErr(d.error || "Ошибка"); this.disabled = false; this.textContent = "Получить код"; return; }
            document.getElementById("step-email").hidden = true;
            document.getElementById("step-code").hidden = false;
            document.getElementById("code-email-display").textContent = email;
            startResendTimer();
          } catch (e) { showErr("Ошибка сети"); }
          this.disabled = false; this.textContent = "Получить код";
        });

        function startResendTimer() {
          clearInterval(timer);
          var secs = 60;
          document.getElementById("resend-count").textContent = secs;
          document.getElementById("resend-timer").style.display = "";
          document.getElementById("btn-resend").style.display = "none";
          timer = setInterval(function () {
            secs--;
            document.getElementById("resend-count").textContent = secs;
            if (secs <= 0) {
              clearInterval(timer);
              document.getElementById("resend-timer").style.display = "none";
              document.getElementById("btn-resend").style.display = "";
            }
          }, 1000);
        }

        document.getElementById("btn-resend").addEventListener("click", async function (e) {
          e.preventDefault();
          this.style.display = "none";
          await fetch("/api/auth/send-code", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ email, purpose: "register" }) });
          startResendTimer();
        });

        document.getElementById("btn-register").addEventListener("click", async function () {
          showErr("");
          var code = document.getElementById("reg-code").value.trim();
          var name = document.getElementById("reg-name").value.trim();
          var password = document.getElementById("reg-password").value;
          if (!code || code.length !== 6) return showErr("Введите 6-значный код из письма");
          if (!name) return showErr("Введите ваше имя");
          if (password && password.length < 8) return showErr("Пароль должен быть не менее 8 символов");
          this.disabled = true; this.textContent = "Регистрация…";
          try {
            const r = await fetch("/api/auth/register", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ email, code, name, password: password || undefined })
            });
            const d = await r.json();
            if (!r.ok) { showErr(d.error || "Ошибка"); this.disabled = false; this.textContent = "Зарегистрироваться"; return; }
            window.location.href = "account.html";
          } catch (e) { showErr("Ошибка сети"); this.disabled = false; this.textContent = "Зарегистрироваться"; }
        });
      })();
    </script>
  </body>
</html>
